<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<meta name="theme-color" content="#15803D"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../shared/base.css"/>

<body data-page="support">
<div class="app">
  <div id="sidebar-mount"></div>

  <div class="main">

    <div class="content">
      <div class="section-title">Support Management</div>

          <div class="support-list-scroll" id="support-sessions-list"></div>

        <div class="panel support-chat-panel" id="support-chat-panel">
          <div class="support-empty">👈 Koi conversation select karein</div>
        </div>
      </div>
    </div>
  </div>

<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/toast.js"></script>
