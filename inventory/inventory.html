<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Inventory | Rinku Kirana Store Admin</title>
<meta name="theme-color" content="#15803D"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../shared/base.css"/>
<link rel="stylesheet" href="inventory.css"/>
</head>
<body data-page="inventory">
<div class="app">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div id="navbar-mount"></div>

    <div class="content">
      <div class="section-title">Inventory Management</div>
      <div class="section-sub">Stock levels aur movement track karein</div>

      <div class="stat-grid" id="inventory-stats"></div>

      <div class="table-wrap">
        <div class="table-head"><h3 style="font-size:0.96rem;font-weight:800;">Stock Alerts</h3></div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Product</th><th>Current Stock</th><th>Threshold</th><th>Status</th></tr></thead>
            <tbody id="inventory-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/modal.js"></script>
<script src="../shared/sidebar.js"></script>
<script src="../shared/navbar.js"></script>
<script src="inventory.js"></script>
</body>
</html>
