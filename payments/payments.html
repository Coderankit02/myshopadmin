<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Payments | Rinku Kirana Store Admin</title>
<meta name="theme-color" content="#15803D"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../shared/base.css"/>
<link rel="stylesheet" href="payments.css"/>
</head>
<body data-page="payments">
<div class="app">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div id="navbar-mount"></div>

    <div class="content">
      <div class="section-title">Payments Management</div>
      <div class="section-sub">Static QR payment verification queue — live Supabase data</div>

      <div class="stat-grid" id="payments-stats"></div>

      <div class="table-wrap">
        <div class="table-head">
          <div class="filter-row" id="payment-filters"></div>
          <div class="tb-search pay-search">
            <span>🔍</span>
            <input id="payment-search" placeholder="UTR, Order ID, Name..."/>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>UTR</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="payments-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/modal.js"></script>
<script src="../shared/sidebar.js"></script>
<script src="../shared/navbar.js"></script>
<script src="payments.js"></script>
</body>
</html>
