<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Ananya AI | Rinku Kirana Store Admin</title>
<meta name="theme-color" content="#15803D"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../shared/base.css"/>
<link rel="stylesheet" href="ai.css"/>
</head>
<body data-page="ai">
<div class="app">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div id="navbar-mount"></div>

    <div class="content">
      <div class="section-title">Ananya AI Management</div>
      <div class="section-sub">AI assistant ka usage aur feedback monitor karein</div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-top"><div class="stat-icon" style="background:#8B5CF622;color:#8B5CF6">🤖</div></div>
          <div class="stat-val">Enabled</div><div class="stat-label">AI Status</div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><div class="stat-icon" style="background:#3B82F622;color:#3B82F6">💬</div></div>
          <div class="stat-val">186</div><div class="stat-label">Conversations Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><div class="stat-icon" style="background:#FFB80022;color:#FFB800">🔢</div></div>
          <div class="stat-val">42.3K</div><div class="stat-label">Tokens Used Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-top"><div class="stat-icon" style="background:#1BA67222;color:#1BA672">👍</div></div>
          <div class="stat-val">92%</div><div class="stat-label">Positive Feedback</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h3>Quick Controls</h3></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn-main" id="disable-ai-btn">Disable AI Assistant</button>
          <button class="btn-ghost" id="view-logs-btn">View Conversation Logs</button>
          <button class="btn-ghost" id="export-feedback-btn">Export Feedback Report</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/modal.js"></script>
<script src="../shared/sidebar.js"></script>
<script src="../shared/navbar.js"></script>
<script src="ai.js"></script>
</body>
</html>
